<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tuner by KD">
  <meta name="theme-color" content="#101014">
  <title>Tuner by KD</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #101014;
      --green: #6cb856;
      --yellow: #a39648;
      --dim: #ac9e84;
      font-variant-ligatures: common-ligatures;
    }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      background: var(--bg);
      font-family: 'Fira Code', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--dim);
      /* Prevent text selection / callout on long press */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #note {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      transition: color 0.1s;
      color: var(--dim);
    }

    #note.green { color: var(--green); }
    #note.yellow { color: var(--yellow); }

    #freq {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: inherit;
      opacity: 0.6;
    }

    #cents {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      margin-top: 0.25rem;
    }

    #start-btn {
      background: none;
      border: 0.1rem solid var(--dim);
      color: var(--dim);
      font-family: 'Fira Code', monospace;
      font-size: 1rem;
      letter-spacing: 0.15em;
      padding: 0.6rem 1.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }
  </style>
</head>
<body>
  <div id="center">
    <div id="note">—</div>
    <div id="freq">— Hz</div>
    <div id="cents"></div>
    <button id="start-btn">tap to listen</button>
  </div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const THRESHOLD = 10;
    const SILENCE_THRESHOLD = 0.11;

    let audioCtx, analyser, buf, source;
    let running = false;
    let silenceTimer = null;

    const noteEl = document.getElementById('note');
    const freqEl = document.getElementById('freq');
    const centsEl = document.getElementById('cents');
    const btn = document.getElementById('start-btn');

    function freqToNote(freq) {
      const semitones = 12 * Math.log2(freq / 440);
      const midi = Math.round(semitones) + 69;
      const cents = Math.round((semitones - (midi - 69)) * 100);
      const octave = Math.floor(midi / 12) - 1;
      const name = NOTE_NAMES[midi % 12];
      return { name: `${name}${octave}`, cents };
    }

    function autoCorrelate(buf, sampleRate) {
      const SIZE = buf.length;
      let rms = 0;
      for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
      rms = Math.sqrt(rms / SIZE);
      if (rms < SILENCE_THRESHOLD) return -1;

      let r1 = 0, r2 = SIZE - 1;
      for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
      for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break; } }
      const sliced = buf.slice(r1, r2);
      const len = sliced.length;

      const c = new Array(len).fill(0);
      for (let i = 0; i < len; i++)
        for (let j = 0; j < len - i; j++)
          c[i] += sliced[j] * sliced[j + i];

      let d = 0;
      while (c[d] > c[d + 1]) d++;
      let maxval = -1, maxpos = -1;
      for (let i = d; i < len; i++) {
        if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
      }
      let T0 = maxpos;
      const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;
      if (a) T0 -= b / (2 * a);
      return sampleRate / T0;
    }

    function showSilence() {
      noteEl.textContent = '—';
      noteEl.className = '';
      freqEl.textContent = '— Hz';
      centsEl.textContent = '';
    }

    function loop() {
      if (!running) return;
      analyser.getFloatTimeDomainData(buf);
      const freq = autoCorrelate(buf, audioCtx.sampleRate);

      if (freq === -1) {
        if (!silenceTimer) silenceTimer = setTimeout(showSilence, 800);
      } else {
        clearTimeout(silenceTimer);
        silenceTimer = null;
        const { name, cents } = freqToNote(freq);
        freqEl.textContent = `${freq.toFixed(1)} Hz`;

        const inTune = Math.abs(cents) <= THRESHOLD;
        noteEl.className = inTune ? 'green' : 'yellow';

        if (inTune) {
          noteEl.textContent = name;
        } else if (cents < 0) {
          noteEl.textContent = `${name} >>`;
        } else {
          noteEl.textContent = `<< ${name}`;
        }

        const sign = cents > 0 ? '+' : '';
        centsEl.textContent = `${sign}${cents}¢`;
      }

      requestAnimationFrame(loop);
    }

    btn.addEventListener('click', async () => {
      if (running) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 8192;
        buf = new Float32Array(analyser.fftSize);
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        running = true;
        btn.style.display = 'none';
        loop();
      } catch (e) {
        btn.textContent = 'mic access denied';
      }
    });
  </script>
</body>
</html>
